name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run unit tests
        run: ./gradlew test

  docker-build-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: fan-fare-be:ci

      - name: Verify image
        run: docker images fan-fare-be:ci

  deploy-test:
    runs-on: ubuntu-latest
    needs: docker-build-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run deploy tests
        run: ./gradlew deployTest

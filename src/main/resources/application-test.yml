spring:
  application:
    name: fanfare
  datasource:
    url: jdbc:h2:mem:test
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  jwt:
    secret: ${JWT_SECRET_KEY:test-secret-key-for-unit-tests}
